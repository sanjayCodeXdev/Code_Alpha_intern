<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexBot — AI FAQ Chatbot</title>
  <meta name="description" content="NexBot is an intelligent FAQ chatbot that answers your questions instantly with a sleek, modern interface." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Main App -->
  <div class="app-container">
    <!-- Header -->
    <header class="chat-header">
      <div class="bot-identity">
        <div class="bot-avatar" aria-label="NexBot avatar">
          <div class="avatar-ring"></div>
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="8" y="12" width="24" height="18" rx="4" fill="url(#botGrad)" />
            <rect x="14" y="6" width="12" height="8" rx="3" fill="url(#botGrad)" />
            <circle cx="16" cy="21" r="3" fill="white" opacity="0.9" />
            <circle cx="24" cy="21" r="3" fill="white" opacity="0.9" />
            <circle cx="16" cy="21" r="1.5" fill="#6c63ff" />
            <circle cx="24" cy="21" r="1.5" fill="#6c63ff" />
            <rect x="17" y="28" width="6" height="3" rx="1.5" fill="white" opacity="0.6" />
            <line x1="20" y1="12" x2="20" y2="6" stroke="url(#botGrad)" stroke-width="2" />
            <circle cx="20" cy="5" r="2" fill="#a78bfa" />
            <defs>
              <linearGradient id="botGrad" x1="8" y1="6" x2="32" y2="30" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c3aed" />
                <stop offset="1" stop-color="#4f46e5" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="bot-info">
          <h1 class="bot-name">NexBot</h1>
          <div class="bot-status">
            <span class="status-dot" aria-hidden="true"></span>
            <span>Online — Always ready</span>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <button id="clearChat" class="icon-btn" title="Clear chat" aria-label="Clear chat history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
            <path d="M10 11v6M14 11v6"></path>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
          </svg>
        </button>
        <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark/light mode">
          <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
          </svg>
          <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Quick Topics -->
    <nav class="quick-topics" aria-label="Quick topic suggestions">
      <span class="topics-label">Quick Topics:</span>
      <div class="topics-scroll" role="list">
        <button class="topic-chip" role="listitem" data-query="What is CodeAlpha?">🚀 About CodeAlpha</button>
        <button class="topic-chip" role="listitem" data-query="How do I get started?">📖 Getting Started</button>
        <button class="topic-chip" role="listitem" data-query="What are the internship tasks?">📋 Tasks</button>
        <button class="topic-chip" role="listitem" data-query="How do I submit my work?">📤 Submission</button>
        <button class="topic-chip" role="listitem" data-query="What certificate will I get?">🏆 Certificate</button>
        <button class="topic-chip" role="listitem" data-query="Tell me a fun fact">🎲 Fun Fact</button>
        <button class="topic-chip" role="listitem" data-query="What is artificial intelligence?">🤖 About AI</button>
        <button class="topic-chip" role="listitem" data-query="How to learn programming?">💻 Learn Coding</button>
      </div>
    </nav>

    <!-- Caution Banner -->
    <div class="caution-banner" role="alert" aria-label="Chatbot disclaimer">
      <span class="caution-icon" aria-hidden="true">⚠️</span>
      <span class="caution-text">
        <strong>FAQ Bot Only</strong> — This chatbot answers predefined questions about CodeAlpha, AI, programming &amp; more. Please <strong>ask a question</strong> to get a response.
      </span>
      <button class="caution-close" id="cautionClose" aria-label="Dismiss caution message" title="Dismiss">✕</button>
    </div>

    <!-- Chat Window -->
    <main class="chat-window" id="chatWindow" aria-live="polite" aria-label="Chat conversation">
      <!-- Messages will be injected here -->
    </main>

    <!-- Typing Area -->
    <footer class="chat-input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          class="chat-input"
          placeholder="Ask a question... (e.g. What is AI?)"
          rows="1"
          maxlength="500"
          aria-label="Type your message"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <div class="input-actions">
          <span class="char-count" id="charCount" aria-live="polite">0/500</span>
          <button id="sendBtn" class="send-btn" aria-label="Send message" title="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
      <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
    </footer>
  </div>

  <script src="chatbot.js"></script>
</body>
</html>
